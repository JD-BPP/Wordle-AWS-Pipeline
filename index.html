<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Wordle Demo</title>

<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 420px;
        margin: 40px auto;
        text-align: center;
    }

    h1 {
        margin-bottom: 10px;
    }

    .grid {
        display: grid;
        grid-template-rows: repeat(6, 60px);
        gap: 10px;
        margin: 20px 0;
    }

    .row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
    }

    .cell {
        border: 2px solid #ccc;
        height: 50px;
        font-size: 24px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
    }

    .correct {
        background-color: #6aaa64;
        color: white;
    }

    .present {
        background-color: #c9b458;
        color: white;
    }

    .absent {
        background-color: #787c7e;
        color: white;
    }

    input {
        font-size: 18px;
        padding: 8px;
        width: 160px;
        text-transform: uppercase;
    }

    button {
        padding: 8px 16px;
        margin-left: 10px;
        font-size: 16px;
        cursor: pointer;
    }

    footer {
        margin-top: 30px;
        font-size: 14px;
        color: gray;
    }
</style>
</head>

<body>

<h1>🟩 DevOps Wordle</h1>
<p>Guess the 5‑letter word</p>

<div id="grid" class="grid"></div>

<div>
    <input id="guessInput" maxlength="5" placeholder="ENTER WORD">
    <button onclick="submitGuess()">Guess</button>
</div>

<p id="message"></p>

<footer>
    Version: 1.0.1 <br>
    Deployed automatically via JD Enterprises AWS Pipeline
</footer>

<script>
/* ==============================
   CONFIGURATION (CHANGE & REDEPLOY)
   ============================== */

const secretWord = "CLOUD";   // 🔁 Change via repo + pipeline
const maxAttempts = 6;        // 🔁 Difficulty control

/* ============================== */

let currentAttempt = 0;
const grid = document.getElementById("grid");
const message = document.getElementById("message");

// Create rows
for (let r = 0; r < maxAttempts; r++) {
    const row = document.createElement("div");
    row.classList.add("row");

    for (let c = 0; c < 5; c++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        row.appendChild(cell);
    }

    grid.appendChild(row);
}

function submitGuess() {
    const input = document.getElementById("guessInput");
    const guess = input.value.toUpperCase();

    if (guess.length !== 5) {
        message.innerText = "Please enter a 5‑letter word.";
        return;
    }

    if (currentAttempt >= maxAttempts) return;

    const row = grid.children[currentAttempt];
    const cells = row.children;

    for (let i = 0; i < 5; i++) {
        cells[i].innerText = guess[i];

        if (guess[i] === secretWord[i]) {
            cells[i].classList.add("correct");
        } else if (secretWord.includes(guess[i])) {
            cells[i].classList.add("present");
        } else {
            cells[i].classList.add("absent");
        }
    }

    if (guess === secretWord) {
        message.innerText = "🎉 Correct!.";
        endGame();
        return;
    }

    currentAttempt++;

    if (currentAttempt === maxAttempts) {
        message.innerText = `❌ Game over. The word was ${secretWord}`;
        endGame();
    }

    input.value = "";
}

function endGame() {
    document.getElementById("guessInput").disabled = true;
}
</script>

</body>
</html>
